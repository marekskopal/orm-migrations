name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: ramsey/composer-install@v3

      - run: vendor/bin/phpstan analyse

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: ramsey/composer-install@v3

      - run: vendor/bin/phpcs

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: ramsey/composer-install@v3

      - name: Set up test database
        run: mysql -h 127.0.0.1 -u root -proot orm_test < tests/Fixtures/database.sql

      - run: vendor/bin/phpunit
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_DATABASE: orm_test
          MYSQL_USER: root
          MYSQL_PASSWORD: root
